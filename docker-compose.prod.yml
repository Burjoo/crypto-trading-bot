version: "3.9"
# Production overrides — use with:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    build:
      target: production
    restart: always
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=WARNING
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000
             --workers 4 --log-level warning"

  frontend:
    build:
      target: production
    restart: always

  db:
    restart: always
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  redis:
    restart: always

  nginx:
    restart: always

volumes:
  postgres_data_prod:
